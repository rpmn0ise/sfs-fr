# FAQ de SFS FR
# Structure : une liste de sections, chacune avec un titre et une liste de questions.
# Pour ajouter une question, ajoute un bloc "- question / reponse" dans la bonne section.
# Pour ajouter une nouvelle section, ajoute un bloc "- section / questions" à la fin du fichier.

- section: "Le jeu"
  questions:
    - question: "Qu'est-ce que Spaceflight Simulator ?"
      reponse: "Spaceflight Simulator (SFS) est un jeu de simulation spatiale disponible sur mobile et PC, où tu conçois et pilotes tes propres fusées pour explorer le système solaire : mise en orbite, alunissage, missions interplanétaires, et plus encore."
    - question: "Le jeu est-il gratuit ?"
      reponse: "Oui, Spaceflight Simulator est gratuit sur mobile (iOS/Android), avec des extensions optionnelles disponibles. Une version PC existe également via Steam."
    - question: "Sur quelles plateformes le jeu est-il disponible ?"
      reponse: "Le jeu est disponible sur Android, iOS et PC (Steam). SFS2, la suite en développement, est prévue en sortie simultanée sur mobile et Steam."
    - question: "Quelle est la différence entre SFS et SFS2 ?"
      reponse: "SFS2 est la suite du jeu original, actuellement en développement. Elle apportera de nouvelles fonctionnalités : astronautes, modules de station spatiale, nouveaux moteurs, boosters, océans, personnalisation des couleurs, et bien plus. Aucune date de sortie n'a encore été annoncée."
    - question: "Le jeu est-il difficile à prendre en main ?"
      reponse: "Le jeu propose une bonne courbe de progression : les bases (décollage, mise en orbite simple) sont accessibles rapidement, mais maîtriser les transferts orbitaux ou les missions complexes demande de la pratique. Le serveur est justement là pour t'aider à progresser !"
    - question: "Y a-t-il des mods pour le jeu ?"
      reponse: "Oui, la communauté SFS propose de nombreux mods (nouvelles pièces, textures, outils). Tu peux en discuter et en partager sur le serveur dans le salon dédié au modding."
- section: "Le serveur Discord"
  questions:
    - question: "Comment rejoindre le serveur ?"
      reponse: "Il te suffit de cliquer sur le bouton \"Rejoindre le Discord\" présent sur ce site pour accéder directement au serveur."
    - question: "Faut-il être bon au jeu pour rejoindre ?"
      reponse: "Absolument pas ! Le serveur est ouvert à tous les niveaux, des débutants qui découvrent tout juste le jeu aux joueurs expérimentés qui maîtrisent les transferts orbitaux complexes."
    - question: "Comment obtenir de l'aide sur le serveur ?"
      reponse: "Rends-toi dans le salon #aide-et-entraide pour poser toutes tes questions sur l'orbite, l'atterrissage, l'optimisation de fusées ou le modding. La communauté et les tutos épinglés sont là pour t'aider."
    - question: "Comment partager mes créations/blueprints ?"
      reponse: "Le salon #bp-sharing est fait pour ça : partage tes fusées et découvre celles des autres membres."
    - question: "Le serveur est-il modéré ?"
      reponse: "Oui, le serveur applique un règlement simple basé sur le respect et la bonne ambiance, avec une équipe de modération disponible en cas de besoin. Tu peux consulter le règlement complet dans le salon #règles."
    - question: "Où trouver les tutos ?"
      reponse: "Les tutos sont disponibles à la fois sur ce site (section Tutos) et épinglés dans le salon #tutos-guides du serveur Discord."
    - question: "Le serveur va-t-il suivre l'actualité de SFS2 ?"
      reponse: "Oui, un salon dédié permet de suivre les annonces et l'actualité de SFS2 au fur et à mesure de son développement, avec un rôle à activer pour être notifié des news."
